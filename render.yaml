services:
  - type: web
    name: resume-expert
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 180 server:app
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: AI_MODE
        value: deepseek
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: PRICE_MARKUP
        value: "1.4"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
