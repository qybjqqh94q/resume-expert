<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>简历专家</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font:14px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;color:#202124;background:#f7f8fa}button,input,textarea{font:inherit}button{cursor:pointer}.hidden{display:none!important}.btn{border:1px solid #d9dde3;background:#fff;border-radius:6px;padding:8px 14px;color:#343942}.btn:hover{background:#f7f8fa}.primary{background:#2563eb;color:#fff;border-color:#2563eb}.primary:hover{background:#1d4ed8}.field{width:100%;border:1px solid #d9dde3;border-radius:6px;padding:9px 11px;background:#fff;outline:none}.field:focus{border-color:#2563eb;box-shadow:0 0 0 3px #2563eb12}.card{background:#fff;border:1px solid #e1e4e8;border-radius:8px;padding:20px}.muted{color:#727985}.tag{display:inline-block;padding:2px 7px;border-radius:4px;background:#eef4ff;color:#2459b8;font-size:12px;margin:2px}.login{min-height:100vh;display:grid;place-items:center}.login-card{width:min(400px,92vw);padding:32px}.brand{font-size:21px;font-weight:700}.tabs{display:flex;margin:22px 0 16px}.tabs button{flex:1;padding:8px;border:1px solid #ddd;background:#fff}.tabs .active{background:#202124;color:#fff}.msg{padding:8px 10px;margin-bottom:12px;background:#fff1f1;color:#b42318;border-radius:5px}.password-wrap{position:relative;margin-bottom:10px}.password-wrap .field{padding-right:44px}.eye{position:absolute;right:5px;top:4px;width:34px;height:34px;border:0;background:transparent;color:#667085;font-size:18px}.code-row{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:10px}.top{height:56px;position:fixed;inset:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 22px;background:#fff;border-bottom:1px solid #e1e4e8;z-index:3}.shell{display:flex;padding-top:56px;height:100vh}.side{width:210px;flex:none;background:#fff;border-right:1px solid #e1e4e8;padding:20px 12px;overflow:auto}.step{width:100%;border:0;background:transparent;text-align:left;padding:9px 10px;border-radius:6px;color:#59616d;margin-bottom:3px}.step.active{background:#eef4ff;color:#2459b8;font-weight:600}.step:disabled{opacity:.4;cursor:not-allowed}.main{flex:1;overflow:auto;padding:30px 38px}.content{max-width:1000px}h1{font-size:22px;margin:0 0 4px}h2{font-size:16px;margin:0 0 14px}h3{font-size:14px;margin:12px 0 6px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.wide{grid-column:1/-1}.actions{display:flex;gap:10px;align-items:center;margin:18px 0;flex-wrap:wrap}.score{font-size:34px;font-weight:700;color:#2563eb}.bar{height:7px;background:#edf0f3;border-radius:5px;overflow:hidden}.bar i{display:block;height:100%;background:#2563eb}.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;background:#fff;min-width:720px}.table th,.table td{text-align:left;vertical-align:top;border-bottom:1px solid #eceef1;padding:11px}.table th{background:#f7f8fa;font-size:12px}.probe,.history-item{margin-bottom:12px}.resume{white-space:pre-wrap;line-height:1.85}.toast{position:fixed;right:24px;bottom:24px;background:#202124;color:#fff;padding:9px 15px;border-radius:6px;z-index:9}.modal{position:fixed;inset:0;background:#0005;display:grid;place-items:center;z-index:5;padding:20px}.modal .card{width:min(720px,96vw);max-height:85vh;overflow:auto}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0}.metric{background:#fff;border:1px solid #e1e4e8;border-radius:8px;padding:16px}.metric b{display:block;font-size:26px}.history-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.empty{text-align:center;padding:60px 20px;color:#8a919c}.admin-link{border-color:#bfdbfe;color:#1d4ed8}@media(max-width:800px){.side{width:155px}.main{padding:22px 16px}.grid,.metrics{grid-template-columns:1fr}.wide{grid-column:auto}.top{padding:0 10px}.top .muted,.topup-label{display:none}}
  </style>
</head>
<body>
  <div id="login" class="login">
    <div class="card login-card">
      <div class="brand">简历专家</div><div class="muted">JD 定制简历优化 Agent</div>
      <div class="tabs"><button id="loginTab" class="active">登录</button><button id="registerTab">注册</button></div>
      <div id="authMsg" class="msg hidden"></div>
      <input id="username" class="field" placeholder="用户名" style="margin-bottom:10px">
      <div id="registerFields" class="hidden">
        <input id="phone" class="field" inputmode="numeric" maxlength="11" placeholder="手机号" style="margin-bottom:10px">
        <div class="code-row"><input id="code" class="field" inputmode="numeric" maxlength="6" placeholder="短信验证码"><button id="sendCode" class="btn">获取验证码</button></div>
      </div>
      <div class="password-wrap"><input id="password" class="field" type="password" placeholder="密码"><button id="togglePassword" class="eye" title="显示密码" aria-label="显示密码">◉</button></div>
      <button id="authBtn" class="btn primary" style="width:100%">登录</button>
      <p class="muted" style="font-size:12px;text-align:center">新用户享 1 次免费完整分析</p>
    </div>
  </div>
  <div id="app" class="hidden">
    <header class="top"><div><span class="brand">简历专家</span> <span class="tag">BETA</span></div><div><button id="adminBtn" class="btn admin-link hidden">用户数据</button> <button id="topupBtn" class="btn"><span class="topup-label">充值</span>积分</button> <span id="creditText"></span> <span id="userText" class="muted" style="margin-left:10px"></span> <button id="logoutBtn" class="btn">退出</button></div></header>
    <div class="shell"><aside class="side"><div class="muted" style="font-size:12px;margin:0 10px 12px">优化流程</div><div id="steps"></div></aside><main class="main"><div id="view" class="content"></div></main></div>
  </div>
  <div id="topupModal" class="modal hidden"><div class="card"><h2>充值积分</h2><p class="muted">本地演示充值，不会发起真实支付。</p><div class="actions"><button class="btn topup" data-value="1000">¥10 · 1000积分</button><button class="btn topup" data-value="5000">¥50 · 5000积分</button></div><button class="btn close-modal">关闭</button></div></div>
  <div id="resumeModal" class="modal hidden"><div class="card"><div class="history-head"><h2 id="resumeTitle">历史简历</h2><button class="btn close-modal">关闭</button></div><div id="resumePreview" class="resume"></div></div></div>
  <div id="toast" class="toast hidden"></div>
  <script>
    const $=selector=>document.querySelector(selector);
    const steps=['输入材料','JD 解析','简历诊断','匹配分析','经历追问','简历优化','最终简历','面试准备','历史简历'];
    let mode='login',token=localStorage.getItem('resume_token')||'',user=null,result=null,current=0,adminView=false;
    const esc=value=>String(value??'').replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
    const list=items=>'<ul>'+items.map(item=>'<li>'+esc(item)+'</li>').join('')+'</ul>';
    async function api(path,body){const response=await fetch(path,{method:body?'POST':'GET',headers:{'Content-Type':'application/json',...(token?{Authorization:'Bearer '+token}:{})},body:body?JSON.stringify(body):undefined});const data=await response.json().catch(()=>({}));if(!response.ok)throw Error(data.error||'请求失败');return data}
    function toast(message){$('#toast').textContent=message;$('#toast').classList.remove('hidden');setTimeout(()=>$('#toast').classList.add('hidden'),2200)}
    function setMode(next){mode=next;$('#loginTab').classList.toggle('active',next==='login');$('#registerTab').classList.toggle('active',next==='register');$('#registerFields').classList.toggle('hidden',next==='login');$('#authBtn').textContent=next==='login'?'登录':'注册';$('#authMsg').classList.add('hidden')}
    $('#loginTab').onclick=()=>setMode('login');$('#registerTab').onclick=()=>setMode('register');
    $('#togglePassword').onclick=()=>{const input=$('#password');const visible=input.type==='text';input.type=visible?'password':'text';$('#togglePassword').textContent=visible?'◉':'◌';$('#togglePassword').title=visible?'显示密码':'隐藏密码';$('#togglePassword').setAttribute('aria-label',$('#togglePassword').title)};
    $('#sendCode').onclick=async()=>{try{const data=await api('/api/send-code',{phone:$('#phone').value});$('#code').value=data.devCode;toast('本地验证码：'+data.devCode+'，5 分钟内有效')}catch(error){toast(error.message)}};
    $('#authBtn').onclick=async()=>{try{const payload={username:$('#username').value,password:$('#password').value};if(mode==='register'){payload.phone=$('#phone').value;payload.code=$('#code').value}const data=await api('/api/'+mode,payload);token=data.token;user=data.user;localStorage.setItem('resume_token',token);showApp()}catch(error){$('#authMsg').textContent=error.message;$('#authMsg').classList.remove('hidden')}};
    function showApp(){$('#login').classList.add('hidden');$('#app').classList.remove('hidden');$('#userText').textContent=user.username;$('#adminBtn').classList.toggle('hidden',!user.isAdmin);refreshCredits();renderSteps();render()}
    function refreshCredits(){$('#creditText').textContent=user.isAdmin?'管理员 · 免费使用':(user.freeUses?'免费机会 1 次':'积分 '+user.credits)}
    function renderSteps(){$('#steps').innerHTML=steps.map((label,index)=>`<button class="step ${!adminView&&index===current?'active':''}" data-index="${index}" ${index>0&&index<8&&!result?'disabled':''}>${index+1}. ${label}</button>`).join('');document.querySelectorAll('.step').forEach(button=>button.onclick=()=>{adminView=false;current=+button.dataset.index;renderSteps();render()})}
    const example={position:'AI 产品经理',industry:'人工智能 / ToB SaaS',company:'成长型科技公司',stage:'3-5 年经验，转向 AI 产品',abilities:'产品策略、数据分析、ToB 产品、跨团队协作',jd:'负责大模型产品规划、需求分析和落地；理解 LLM 能力边界；与算法和工程团队协作；具备 3 年以上产品经验、SQL 能力和 ToB SaaS 经验。',resume:'张三｜产品经理｜3 年经验\n\n某科技公司 产品经理 2021.06-至今\n- 负责 ERP 系统产品规划与迭代\n- 主导企业微信与 ERP 集成，审批效率提升 50%\n- 从 0 到 1 搭建经营数据报表平台\n- 设计 RBAC 权限模型\n\n技能：SQL、Excel、Axure、Figma',extra:'正在系统学习大模型、RAG 与 Prompt Engineering。'};
    function inputView(){return `<h1>输入材料</h1><p class="muted">基于目标岗位 JD，对简历进行完整诊断与重构。</p><div class="actions"><button id="example" class="btn">使用示例数据</button></div><div class="card grid"><label>目标岗位<input id="position" class="field"></label><label>目标行业<input id="industry" class="field"></label><label>公司类型<input id="company" class="field"></label><label>求职阶段<input id="stage" class="field"></label><label class="wide">希望突出能力<input id="abilities" class="field"></label><label class="wide">目标 JD<textarea id="jd" class="field" rows="7"></textarea></label><label class="wide">原始简历<textarea id="resume" class="field" rows="10"></textarea></label><label class="wide">补充信息<textarea id="extra" class="field" rows="4"></textarea></label></div><div class="actions"><button id="analyze" class="btn primary">开始分析</button><span id="status" class="muted"></span></div>`}
    function bindInput(){Object.entries(example).forEach(()=>{});$('#example').onclick=()=>Object.entries(example).forEach(([key,value])=>$('#'+key).value=value);$('#analyze').onclick=analyze}
    async function render(){const view=$('#view');if(adminView)return renderAdmin();if(current===8)return renderHistory();if(!result||current===0){view.innerHTML=inputView();bindInput();return}const data=result;
      if(current===1)view.innerHTML=`<h1>JD 解析</h1><div class="card"><h2>岗位职责</h2>${list(data.jd.responsibilities)}<h2>硬性要求</h2>${list(data.jd.must)}<h2>隐性要求</h2>${list(data.jd.hidden)}<h2>关键词</h2>${data.jd.keywords.map(item=>`<span class="tag">${esc(item)}</span>`).join('')}<h2>理想候选人</h2><p>${esc(data.jd.persona)}</p></div>`;
      if(current===2)view.innerHTML=`<h1>简历诊断</h1><div class="card"><span class="score">${data.diagnosis.score}</span> / 100<h2>维度评分</h2>${data.diagnosis.dimensions.map(item=>`<p>${esc(item.name)} ${item.score}</p><div class="bar"><i style="width:${item.score}%"></i></div>`).join('')}<h2>主要问题</h2>${list(data.diagnosis.issues)}<h2>优先修改建议</h2>${list(data.diagnosis.suggestions)}</div>`;
      if(current===3)view.innerHTML=`<h1>匹配分析</h1><div class="card table-wrap" style="padding:0"><table class="table"><tr><th>JD 要求</th><th>简历证据</th><th>强度</th><th>是否补充</th><th>建议</th></tr>${data.matching.map(item=>`<tr><td>${esc(item.requirement)}</td><td>${esc(item.evidence)}</td><td>${esc(item.strength)}</td><td>${item.supplement?'需要':'否'}</td><td>${esc(item.advice)}</td></tr>`).join('')}</table></div>`;
      if(current===4){view.innerHTML=`<h1>经历追问</h1><p class="muted">填写真实细节后生成可用于简历的表达。</p>${data.probes.map((question,index)=>`<div class="card probe"><b>${index+1}. ${esc(question)}</b><textarea class="field answer" data-index="${index}" rows="3" placeholder="写下你的回答"></textarea><button class="btn bullet" data-index="${index}" style="margin-top:8px">生成 Bullet</button><p id="bullet${index}"></p></div>`).join('')}`;document.querySelectorAll('.bullet').forEach(button=>button.onclick=()=>{const answer=document.querySelector(`.answer[data-index="${button.dataset.index}"]`).value;$('#bullet'+button.dataset.index).textContent=answer?'• '+answer.replace(/[。.]?$/,'，体现了数据驱动的产品决策与跨团队落地能力。'):'请先填写回答'})}
      if(current===5)view.innerHTML=`<h1>简历优化</h1><div class="actions"><button class="btn">更简洁</button><button class="btn">降低夸张</button><button class="btn">更偏 AI 产品</button><button class="btn">更偏 ToB SaaS</button></div>${data.optimizations.map(item=>`<div class="card" style="margin-bottom:12px"><div class="grid"><div><h3>修改前</h3><p>${esc(item.before)}</p></div><div><h3>修改后</h3><p>${esc(item.after)}</p></div></div><p class="muted">理由：${esc(item.reason)}｜风险：${esc(item.risk)}</p></div>`).join('')}`;
      if(current===6){view.innerHTML=`<div class="actions" style="justify-content:space-between"><h1>最终简历</h1><button id="copy" class="btn primary">复制最终简历</button></div><div class="card resume">${esc(data.finalResume)}</div>`;$('#copy').onclick=()=>navigator.clipboard.writeText(data.finalResume).then(()=>toast('已复制'))}
      if(current===7)view.innerHTML=`<h1>面试准备</h1><div class="card"><h2>自我介绍</h2><p>${esc(data.interview.intro)}</p><h2>10 个可能追问</h2>${list(data.interview.questions)}<h2>需要准备的证据</h2>${list(data.interview.evidence)}<h2>可能夸大的表达</h2>${list(data.interview.risks)}<h2>建议补充的数据</h2>${list(data.interview.data)}</div>`;
    }
    async function analyze(){const payload={};['position','industry','company','stage','abilities','jd','resume','extra'].forEach(key=>payload[key]=$('#'+key).value);if(!payload.jd||!payload.resume){toast('请填写 JD 和原始简历');return}$('#analyze').disabled=true;$('#status').textContent='AI 正在分析...';try{const data=await api('/api/analyze',payload);result=data.result;user=data.user;current=1;refreshCredits();renderSteps();render()}catch(error){toast(error.message);$('#analyze').disabled=false;$('#status').textContent=''}}
    async function renderHistory(){const view=$('#view');view.innerHTML='<h1>历史简历</h1><p class="muted">正在加载...</p>';try{const data=await api('/api/history');view.innerHTML=`<h1>历史简历</h1><p class="muted">每次完成分析后自动保存，可随时查看或下载。</p>${data.items.length?data.items.map(item=>`<div class="card history-item"><div class="history-head"><div><h2>${esc(item.title)}</h2><div class="muted">${esc(item.created_at)} · 匹配度 ${item.match_score}/100</div></div><div><button class="btn view-history" data-id="${item.id}">查看</button> <button class="btn download-history" data-id="${item.id}">下载</button></div></div></div>`).join(''):'<div class="card empty">暂无历史简历，完成一次分析后会自动保存。</div>'}`;const map=new Map(data.items.map(item=>[String(item.id),item]));document.querySelectorAll('.view-history').forEach(button=>button.onclick=()=>previewHistory(map.get(button.dataset.id)));document.querySelectorAll('.download-history').forEach(button=>button.onclick=()=>downloadHistory(map.get(button.dataset.id)))}catch(error){view.innerHTML=`<div class="msg">${esc(error.message)}</div>`}}
    function previewHistory(item){$('#resumeTitle').textContent=item.title;$('#resumePreview').textContent=item.resume_text;$('#resumeModal').classList.remove('hidden')}
    function downloadHistory(item){const link=document.createElement('a');link.href=`/api/history/${item.id}/download?token=${encodeURIComponent(token)}`;link.download=item.title.replace(/[\\/:*?"<>|]/g,'_')+'.txt';link.style.display='none';document.body.appendChild(link);link.click();link.remove();toast('历史简历已下载')}
    async function renderAdmin(){const view=$('#view');view.innerHTML='<h1>用户数据监测</h1><p class="muted">正在加载...</p>';try{const data=await api('/api/admin/stats');const summary=data.summary;view.innerHTML=`<h1>用户数据监测</h1><p class="muted">用户、分析和积分使用情况。</p><div class="metrics"><div class="metric"><span class="muted">用户总数</span><b>${summary.users}</b></div><div class="metric"><span class="muted">分析次数</span><b>${summary.analyses}</b></div><div class="metric"><span class="muted">历史简历</span><b>${summary.resumes}</b></div><div class="metric"><span class="muted">用户积分余额</span><b>${summary.credits}</b></div></div><div class="card table-wrap" style="padding:0"><table class="table"><tr><th>用户</th><th>手机号</th><th>身份</th><th>积分</th><th>免费次数</th><th>分析次数</th><th>注册时间</th><th>最近登录</th></tr>${data.users.map(item=>`<tr><td>${esc(item.username)}</td><td>${esc(item.phone||'-')}</td><td>${item.is_admin?'管理员':'用户'}</td><td>${item.credits}</td><td>${item.free_uses}</td><td>${item.total_analyses}</td><td>${esc(item.created_at||'-')}</td><td>${esc(item.last_login||'-')}</td></tr>`).join('')}</table></div>`}catch(error){view.innerHTML=`<div class="msg">${esc(error.message)}</div>`}}
    $('#adminBtn').onclick=()=>{adminView=true;renderSteps();renderAdmin()};$('#logoutBtn').onclick=()=>{localStorage.removeItem('resume_token');location.reload()};$('#topupBtn').onclick=()=>$('#topupModal').classList.remove('hidden');document.querySelectorAll('.close-modal').forEach(button=>button.onclick=()=>button.closest('.modal').classList.add('hidden'));document.querySelectorAll('.topup').forEach(button=>button.onclick=async()=>{try{const data=await api('/api/topup',{credits:+button.dataset.value});user=data.user;refreshCredits();$('#topupModal').classList.add('hidden');toast('充值成功')}catch(error){toast(error.message)}});
    (async()=>{if(!token)return;try{const data=await api('/api/me');user=data.user;showApp()}catch{localStorage.removeItem('resume_token');token=''}})();
  </script>
</body>
</html>
